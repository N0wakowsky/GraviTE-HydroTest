name: Continuous Deployment (CD)

on:
  push:
    branches: [ "develop_release" ]

# KLUCZOWE: Dajemy skryptowi uprawnienia do tworzenia wydań (Releases)
permissions:
  contents: write

jobs:

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable
    - uses: swatinem/rust-cache@v2

    - name: Build Release Windows
      working-directory: gravite_hydrotest
      run: cargo build --release

    - name: Upload Windows Binary
      uses: actions/upload-artifact@v4
      with:
        name: windows-bin
        path: gravite_hydrotest/target/release/app.exe

  package-release:
    runs-on: ubuntu-latest
    needs: [build-windows]
    steps:
    - uses: actions/checkout@v4

    - name: Prepare Package Directory
      run: mkdir -p GraviTE_release

    - name: Download Windows Binary
      uses: actions/download-artifact@v4
      with:
        name: windows-bin
        path: ./GraviTE_release

    - name: Rename Binary for Release
      run: mv ./GraviTE_release/app.exe ./GraviTE_release/GraviTEHydroTest.exe

    - name: Copy STM32 ELF File
      run: cp gravite_hydrotest_stm32/build/Debug/GraviTE_test.elf ./GraviTE_release/GraviTE_test.elf

    - name: Copy Configuration and Procedures
      run: |
        cp gravite_hydrotest/config.yaml ./GraviTE_release/
        cp -r gravite_hydrotest/procedures ./GraviTE_release/

    - name: Zip Final Package
      run: zip -r GraviTEHydroTest_Release.zip GraviTE_release/

    - name: Update GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-dev
        name: "GraviTE HydroTest - Latest Development Build"
        body: |
          GraviTE HydroTest release package
          
          **Last Actualization:** ${{ github.event.head_commit.message }} (Commit: `${{ github.sha }}`)
        prerelease: true
        files: GraviTEHydroTest_Release.zip